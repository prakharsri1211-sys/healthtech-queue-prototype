server.port=${PORT:8080}
server.address=0.0.0.0
spring.main.web-application-type=servlet
spring.main.lazy-initialization=true

# ─── PostgreSQL (local development / environment override) ────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool tuning (Optimized for aggressive idle releasing & Render memory caps)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=120000
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# ─── Gzip Compression Configuration ──────────────────────────────────────────
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
server.compression.min-response-size=1024

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
# Prevents timeouts during initial metadata probing on remote connections
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ─── Flyway (Database Migration) ─────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.out-of-order=true
spring.flyway.ignore-migration-patterns=*:missing

# ─── MongoDB (Clinical Data) ──────────────────────────────────────────────────
# Defaulted to local for the Mobile Health-Tech Prototype schema
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.data.mongodb.auto-index-creation=true

# ─── Redis (Disabled for RAM conservation) ──────────────────────────
spring.data.redis.repositories.enabled=false
spring.cache.type=none
management.health.redis.enabled=false

# ─── JWT & Security ───────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── Timezone (UTC Enforced) ──────────────────────────────────────────────────
spring.jackson.time-zone=UTC
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.example.healthtech=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=TRACE
logging.level.com.zaxxer.hikari=DEBUG

# ─── Actuator & Prometheus (Grafana Monitoring) ───────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# ─── Grafana Cloud Remote Write ───────────────────────────────────────────────
management.prometheus.metrics.export.pushgateway.enabled=false

# Prometheus Remote Write to Grafana Cloud
management.metrics.export.prometheus.enabled=true
# (Already exposed above)

# Remote write configuration
management.prometheus.metrics.export.step=1m
management.prometheus.metrics.export.descriptions=true

# Optional: Custom metric filters (only send important metrics)
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.logback=true
management.metrics.enable.mongodb=true
management.metrics.enable.tomcat=true

# ─── Snappy Compression Configuration ─────────────────────────────────────────
# Switched from JNI-based snappy-java to pure Java org.iq80.snappy to prevent
# UnsatisfiedLinkError in container environments lacking native JNI glibc loader.

# Tag all metrics with your app name so the Grafana dashboard can filter them
management.metrics.tags.application=Online-queue-Project
management.metrics.tags.instance=Render-Production-Node

# Expose Actuator and Prometheus Endpoints
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true

# Enable pushing metrics to Grafana Cloud
management.prometheus.metrics.export.enabled=true
management.prometheus.metrics.export.url=${GRAFANA_METRICS_URL}
management.prometheus.metrics.export.username=${GRAFANA_INSTANCE_ID}
management.prometheus.metrics.export.password=${GRAFANA_API_KEY}

# ─── Web Push (VAPID Keys) ────────────────────────────────────────────────────
vapid.public.key=${VAPID_PUBLIC_KEY}
vapid.private.key=${VAPID_PRIVATE_KEY}