services:
  frontend:
    build: ./frontend
    container_name: healthtech-frontend
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      backend:
        condition: service_started
    networks:
      - healthtech-network

  backend:
    build: ./backend
    container_name: healthtech-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://healthtech-postgres:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_DATA_MONGODB_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@healthtech-mongodb:27017/healthtech?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_started
      mongodb:
        condition: service_started
    restart: on-failure
    networks:
      - healthtech-network

  postgres:
    image: postgres:16
    container_name: healthtech-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - healthtech-network

  mongodb:
    image: mongo:7
    container_name: healthtech-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--username", "${MONGO_INITDB_ROOT_USERNAME}", "--password", "${MONGO_INITDB_ROOT_PASSWORD}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - healthtech-network


  pgadmin:
    image: dpage/pgadmin4
    container_name: healthtech-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@healthtech.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_started
    networks:
      - healthtech-network

volumes:
  postgres_data:
  mongodb_data:

networks:
  healthtech-network:
    driver: bridge

